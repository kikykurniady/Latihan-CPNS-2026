publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: 2.5.1
  riverpod_annotation: 2.3.5
  drift: 2.18.0
  sqflite: 2.3.3
  path_provider: 2.1.3
  google_mobile_ads: 5.1.0
  go_router: 14.2.0
  fl_chart: 0.68.0
  shared_preferences: 2.3.1
  freezed_annotation: 2.4.4
  json_annotation: 4.9.0
  uuid: 4.4.2
